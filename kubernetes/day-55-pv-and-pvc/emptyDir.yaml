apiVersion: v1
kind: Pod
metadata:
  name: empty-demo
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
    - |
      while true; do 
        date >> /data/message.txt;
        sleep 5;
      done;
    volumeMounts:
      - name: data-volume
        mountPath: /data
  volumes:
    - name: data-volume
      emptyDir: {}