apiVersion: v1
kind: Pod
metadata:
  name: pvc-pod
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["/bin/sh","-c"]
    args:
    - |
      echo "Hello from Second Pod" >> /data/message.txt;
      sleep 3600;
    volumeMounts:
      - name: storage
        mountPath: /data
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: my-pvc
