name: Deploy To Server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:

            - name: SSH to prod server
              uses: appleboy/ssh-action@v1
              with: 
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                    echo "Starting Deployment"
                    mkdir -p devops

