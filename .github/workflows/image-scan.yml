# Uses Trivy Image scanner for CVEs
name: Image Scanner

on:
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest

        steps:
            
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN}}

            # Trivy Scanner (Show HIGH/CRITICAL, Fail on CRITICAL)
            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: 'docker.io/${{ vars.DOCKERHUB_USERNAME }}/node-app:latest'
                format: 'table'
                severity: 'CRITICAL,HIGH'
                exit-code: '1'
                ignore-unfixed: true
                exit-on-eol: 0
