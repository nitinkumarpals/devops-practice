name: Manual Hello Workflow

on:
    workflow_dispatch:
      inputs:
        environment:
          type: choice
          options:
            - dev
            - staging
            - production

jobs:
    manual-jobs:
        runs-on: ubuntu-latest
        
        steps:
              - name: Say Hello
                run: echo "Hello! This workflow was triggered manually."

              - name: Show User
                run: echo "Triggered by $GITHUB_ACTOR"

              - name: Show Date
                run: date
