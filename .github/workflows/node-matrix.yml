on:
    # push:
    #     branches: 
    #         - 'main'
    #     paths:
    #         - 'node/**'
    workflow_dispatch:

jobs:
    validate:

        runs-on: ubuntu-latest
        strategy:
          fail-fast: true
          matrix:
            node-version: [18,20,22]
        defaults:
            run:
                working-directory: node

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v3
              with:
                node-version: ${{ matrix.node-version }}
            - run: node -v
            
            - name: install dependencies
              run: npm install

            - name: run linting, tests and build
              run: npm run verify

            - name : finish
              run : echo "Validation complete!"
