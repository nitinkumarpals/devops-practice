name: hello

on: 
  push:
    branches: [main]

jobs:

  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello to all
        run: echo "hello everyone"

      - name: say hello to user
        run: echo "hello $USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: show versions
        run: docker --version && python --version && node --version

      - name: show more details
        run: free -h && df -h

    
