services:

  web:
    build: ./app
    container_name: python-app

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      
    networks:
      - python-app-network
    labels:
      - project=python-app
      - service=web

  db:
    image: postgres:16
    container_name: db

    environment:
      - POSTGRES_PASSWORD=password

    volumes:
      - postgres-data-python:/var/lib/postgresql/data
    
    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - python-app-network
      
    labels:
      - project=python-app
      - service=db

  redis:
    image: redis:latest
    container_name: redis

    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    
    networks:
      - python-app-network
      
    labels:
      - project=pythonapp
      - service=cache

networks:
  python-app-network:

volumes:
  postgres-data-python:
    
