services:
  web-java:
    build: ./app
    container_name: java-app
    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - java-app-network

    labels:
      - project=multi-tier-app-java
      - service=web-java

  db:
    image: postgres:16

    environment:
      - POSTGRES_PASSWORD=password

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: always

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - java-app-network

    labels:
      - project=multi-tier-app-java
      - service=database

  redis:
    image: redis:latest

    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      
    networks:
      - java-app-network

    labels:
      - project=multi-tier-app-java
      - service=cache

networks:
  java-app-network:

volumes:
  postgres-data: